server:
  port: 8082

spring:
  application:
    name: player-service
  datasource:
    url: jdbc:postgresql://localhost:5432/airconsole
    username: airconsole
    password: airconsole
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

jwt:
  secret: ${JWT_SECRET:default-very-long-secret-key-for-development-only}

logging:
  level:
    com.airconsole.player: DEBUG
