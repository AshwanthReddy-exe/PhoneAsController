# server.port=8084
server:
  port: 8084

spring:
  application:
    name: notification-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379

# URL of player-service for connection lifecycle updates
player-service:
  url: http://localhost:8082

# Azure SignalR Service configuration
signalr:
  hub-url: ${AZURE_SIGNALR_HUB_URL:http://localhost:8080}
  access-token: ${AZURE_SIGNALR_ACCESS_TOKEN:}

# Actuator health checks
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.airconsole.notification: DEBUG