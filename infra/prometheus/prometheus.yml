global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'airconsole-api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'airconsole-room-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['room-service:8081']

  - job_name: 'airconsole-player-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['player-service:8082']

  - job_name: 'airconsole-game-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['game-service:8083']

  - job_name: 'airconsole-notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8084']

  - job_name: 'airconsole-score-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['score-service:8085']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
