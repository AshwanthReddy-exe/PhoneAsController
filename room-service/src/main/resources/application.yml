server:
  port: 8081

spring:
  application:
    name: room-service
  datasource:
    url: jdbc:postgresql://localhost:5432/airconsole
    username: airconsole
    password: airconsole
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.airconsole.room: DEBUG
