spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: room-service
          uri: http://room-service:8081
          predicates:
            - Path=/api/rooms/**
          filters:
            - name: RateLimit
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: player-service
          uri: http://player-service:8082
          predicates:
            - Path=/api/players/**
          filters:
            - name: RateLimit
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: game-service
          uri: http://game-service:8083
          predicates:
            - Path=/api/games/**
          filters:
            - name: RateLimit
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: score-service
          uri: http://score-service:8085
          predicates:
            - Path=/api/leaderboard/**,/api/history/**
          filters:
            - name: RateLimit
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.airconsole.gateway: INFO
